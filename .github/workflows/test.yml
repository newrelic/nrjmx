---
name: Testing

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
    paths-ignore:
      - README.md
jobs:
  unit-test-linux:
    name: Linux unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        if: ${{ secrets.OHAI_DOCKER_HUB_ID != '' && secrets.OHAI_DOCKER_HUB_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}

      - name: Running unit tests
        run: make ci/test

  test-go-linux-jdk8:
    name: Linux unit tests for Go on JDK 8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'gojmx/go.mod'
      - name: Login to DockerHub
        if: ${{ secrets.OHAI_DOCKER_HUB_ID != '' && secrets.OHAI_DOCKER_HUB_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}

      - name: Running unit tests
        run: make ci/go-test

  test-go-linux-jdk11:
    name: Linux unit tests for Go on JDK 11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'gojmx/go.mod'
      - name: Login to DockerHub
        if: ${{ secrets.OHAI_DOCKER_HUB_ID != '' && secrets.OHAI_DOCKER_HUB_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}

      - name: Running unit tests
        run: make ci/go-test-jdk11

  check-gen-code:
    name: Checking generated code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        if: ${{ secrets.OHAI_DOCKER_HUB_ID != '' && secrets.OHAI_DOCKER_HUB_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}
      - name: Checking generated code
        run: make ci/check-gen-code

  test-build:
    name: Test jar compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        if: ${{ secrets.OHAI_DOCKER_HUB_ID != '' && secrets.OHAI_DOCKER_HUB_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}
      - name: Build noarch
        run: make ci/build